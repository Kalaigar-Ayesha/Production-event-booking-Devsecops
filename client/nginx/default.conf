server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    # No server tokens in responses
    server_tokens off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
