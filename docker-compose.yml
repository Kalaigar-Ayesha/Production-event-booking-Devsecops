# Eventora stack: MongoDB (authenticated) + API + static frontend
#
# Before first run: copy .env.example to .env and set MONGO_ROOT_* and JWT_SECRET.
# If you previously used Mongo without auth, reset data once:
#   docker compose down -v
#
# MONGO_URI is built from the same credentials as MONGO_INITDB_*.
# Use a password without URI-reserved characters (: @ / ? #) or percent-encode them.
services:
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:?Set MONGO_ROOT_USERNAME in .env}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?Set MONGO_ROOT_PASSWORD in .env}
    volumes:
      - mongo_data:/data/db
    networks:
      - db_private
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          mongosh --quiet -u "$$MONGO_INITDB_ROOT_USERNAME" -p "$$MONGO_INITDB_ROOT_PASSWORD"
          --authenticationDatabase admin --eval 'db.adminCommand({ping:1}).ok' | grep -qx 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/eventora?authSource=admin
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      DNS_SERVERS: ${DNS_SERVERS:-}
      USE_SYSTEM_DNS: ${USE_SYSTEM_DNS:-}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app_private
      - db_private
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - app_private
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - public
      - app_private
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  mongo_data:

networks:
  public:
    driver: bridge
  app_private:
    driver: bridge
    internal: true
  db_private:
    driver: bridge
    internal: true
