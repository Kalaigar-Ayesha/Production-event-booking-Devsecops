## Vault-backed secrets via External Secrets Operator (ESO)
##
## This manifest does NOT hardcode any secret values.
## It instructs ESO to read values from Vault and create a Kubernetes Secret named `eventora-secrets`.
##
## Expected Vault KV v2 paths (examples):
## - secret/data/eventora/api
## - secret/data/eventora/mongo
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: eventora-secrets
  namespace: eventora
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: SecretStore
  target:
    name: eventora-secrets
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: eventora/api
        property: JWT_SECRET
    - secretKey: EMAIL_USER
      remoteRef:
        key: eventora/api
        property: EMAIL_USER
    - secretKey: EMAIL_PASS
      remoteRef:
        key: eventora/api
        property: EMAIL_PASS
    - secretKey: MONGO_ROOT_USERNAME
      remoteRef:
        key: eventora/mongo
        property: MONGO_ROOT_USERNAME
    - secretKey: MONGO_ROOT_PASSWORD
      remoteRef:
        key: eventora/mongo
        property: MONGO_ROOT_PASSWORD
    - secretKey: MONGO_URI
      remoteRef:
        key: eventora/mongo
        property: MONGO_URI
