apiVersion: v1
kind: Secret
metadata:
  name: eventora-secrets
  namespace: eventora
type: Opaque
stringData:
  # App secrets (replace before production)
  JWT_SECRET: "CHANGE_ME"

  # Mongo root/admin creds used for init + app connection
  MONGO_ROOT_USERNAME: "eventora"
  MONGO_ROOT_PASSWORD: "CHANGE_ME"
  # Full Mongo connection string (Kubernetes does not expand $(VAR) in env.value)
  MONGO_URI: "mongodb://eventora:CHANGE_ME@mongo:27017/eventora?authSource=admin"

  # Optional email creds used by API (if your app needs them)
  EMAIL_USER: ""
  EMAIL_PASS: ""
