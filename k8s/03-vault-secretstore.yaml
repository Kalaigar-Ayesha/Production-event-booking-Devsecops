## Vault secret store for External Secrets Operator (ESO)
##
## Prereqs:
## - External Secrets Operator installed (CRDs in cluster)
## - Vault installed/reachable and configured with Kubernetes auth
## - A Kubernetes ServiceAccount in this namespace bound in Vault (role: eventora)
##
## Notes:
## - This manifest contains NO secrets. It just defines the Vault backend connection and auth method.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault
  namespace: eventora
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eventora"
          serviceAccountRef:
            name: eventora-api

