limit_req_zone $binary_remote_addr zone=perip:10m rate=20r/s;

map $http_user_agent $bad_ua {
  default 0;
  "~*sqlmap|nikto|nmap|acunetix|wpscan|masscan|dirbuster|fuzz" 1;
}

server {
  listen 80;
  server_name _;

  # Simulate WAF-style blocking rules
  if ($bad_ua) { return 403; }
  if ($request_method !~ ^(GET|POST|PUT|PATCH|DELETE|OPTIONS)$) { return 405; }
  if ($request_uri ~* "(\\.|%2e){2,}|%00|%0d|%0a") { return 403; } # traversal / null-byte / CRLF
  if ($args ~* "(union(\\s|%20)+select|or(\\s|%20)+1=1|sleep\\(|benchmark\\()") { return 403; } # basic SQLi patterns

  # Redirect to HTTPS if certs are mounted and client uses https
  # (for local you can still use http://localhost if you prefer)
  # return 301 https://$host$request_uri;

  location /stub_status {
    stub_status;
    allow 127.0.0.1;
    deny all;
  }

  location /api/ {
    limit_req zone=perip burst=40 nodelay;
    proxy_pass http://api:5000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    limit_req zone=perip burst=60 nodelay;
    proxy_pass http://web:8080/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 443 ssl http2;
  server_name _;

  ssl_certificate     /etc/nginx/certs/tls.crt;
  ssl_certificate_key /etc/nginx/certs/tls.key;
  ssl_protocols TLSv1.2 TLSv1.3;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  if ($bad_ua) { return 403; }
  if ($request_method !~ ^(GET|POST|PUT|PATCH|DELETE|OPTIONS)$) { return 405; }
  if ($request_uri ~* "(\\.|%2e){2,}|%00|%0d|%0a") { return 403; }
  if ($args ~* "(union(\\s|%20)+select|or(\\s|%20)+1=1|sleep\\(|benchmark\\()") { return 403; }

  location /api/ {
    limit_req zone=perip burst=40 nodelay;
    proxy_pass http://api:5000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    limit_req zone=perip burst=60 nodelay;
    proxy_pass http://web:8080/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
