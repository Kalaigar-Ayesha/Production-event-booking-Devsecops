global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]

  # App metrics (run your app stack and point Prometheus to it)
  # If running locally with docker-compose.yml:
  # - API metrics are available on http://localhost/api/metrics through Nginx
  # For simplicity, scrape directly from the API service if Prometheus shares a network.
  - job_name: eventora-api
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:5000"]

